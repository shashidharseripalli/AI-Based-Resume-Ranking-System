<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Ranking Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero reveal">
      <p class="eyebrow">AI Resume Ranking</p>
      <h1>Match candidates to your role in seconds</h1>
      <p class="subtitle">
        Paste the job description, add resumes, and rank candidates using the existing backend.
      </p>
    </section>

    <section class="panel reveal">
      <h2>Job Description</h2>
      <label class="field">
        <span>Role Requirements</span>
        <textarea id="jobDescription" rows="6" placeholder="Example: Looking for Python, SQL, machine learning, NLP, and API integration experience."></textarea>
      </label>
    </section>

    <section class="panel reveal">
      <div class="row-actions">
        <input id="resumeUploadInput" type="file" accept=".pdf,.doc,.docx,.txt,.md,.text,.csv,.json,.log,.rtf,text/plain,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" multiple hidden>
        <button id="uploadResumesBtn" type="button" class="btn secondary">Upload All Resumes</button>
      </div>
      <p id="uploadSummary" class="status">No resumes uploaded yet.</p>
    </section>

    <section class="actions reveal">
      <button id="rankBtn" type="button" class="btn primary">Rank Candidates</button>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>

    <section class="panel reveal">
      <div class="row">
        <h2>Ranked Results</h2>
      </div>
      <div id="resultsContainer" class="results empty">
        Submit the form to see rankings.
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
