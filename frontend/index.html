<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Ranking Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero reveal">
      <p class="eyebrow">AI Resume Ranking</p>
      <h1>Match candidates to your role in seconds</h1>
      <p class="subtitle">
        Paste the job description, add resumes, and rank candidates using the existing backend.
      </p>
    </section>

    <section class="panel reveal">
      <h2>Backend Settings</h2>
      <div class="grid two">
        <label class="field">
          <span>API Base URL</span>
          <input id="apiBase" type="text" value="http://localhost:8000" placeholder="http://localhost:8000">
        </label>
        <div class="weights">
          <label class="field">
            <span>TF-IDF Weight</span>
            <input id="tfidfWeight" type="number" step="0.1" min="0" max="1" value="0.8">
          </label>
          <label class="field">
            <span>Keyword Weight</span>
            <input id="keywordWeight" type="number" step="0.1" min="0" max="1" value="0.2">
          </label>
        </div>
      </div>
      <p class="hint">Endpoint used: <code>POST /api/rank</code></p>
    </section>

    <section class="panel reveal">
      <h2>Job Description</h2>
      <label class="field">
        <span>Role Requirements</span>
        <textarea id="jobDescription" rows="6" placeholder="Example: Looking for Python, SQL, machine learning, NLP, and API integration experience."></textarea>
      </label>
    </section>

    <section class="panel reveal">
      <div class="row">
        <h2>Candidate Resumes</h2>
        <button id="addCandidateBtn" type="button" class="btn secondary">Add Candidate</button>
      </div>
      <div id="candidateList" class="candidate-list"></div>
    </section>

    <section class="actions reveal">
      <button id="rankBtn" type="button" class="btn primary">Rank Candidates</button>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>

    <section class="panel reveal">
      <div class="row">
        <h2>Ranked Results</h2>
      </div>
      <div id="resultsContainer" class="results empty">
        Submit the form to see rankings.
      </div>
    </section>
  </main>

  <template id="candidateTemplate">
    <article class="candidate-card">
      <div class="grid two">
        <label class="field">
          <span>Candidate ID</span>
          <input type="text" class="candidate-id" placeholder="cand_001">
        </label>
        <div class="controls">
          <button type="button" class="btn ghost remove-btn">Remove</button>
        </div>
      </div>
      <label class="field">
        <span>Resume Text</span>
        <textarea rows="4" class="resume-text" placeholder="Paste resume summary or full text..."></textarea>
      </label>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
